worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # rate limit (กัน abuse — E7-2)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/m;

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS — API + Web
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 50M;  # upload เอกสาร

        # API
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass         http://api:8000/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;  # รอ LLM response
        }

        # LINE webhook (ไม่ rate limit — LINE ส่งเอง)
        location /line/ {
            proxy_pass         http://api:8000/line/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        # Web frontend (เปิดเมื่อมี Next.js)
        # location / {
        #     proxy_pass http://web:3000/;
        #     proxy_set_header Host $host;
        # }
    }
}
