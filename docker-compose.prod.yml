# KbaseSME — Production overrides
# รัน: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    # ไม่ mount src/ — ใช้ image ที่ build แล้ว
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data
    # ไม่ expose port ตรง — ผ่าน nginx เท่านั้น
    ports: []
    environment:
      APP_ENV: production
      LOG_LEVEL: WARNING

  worker:
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data
    environment:
      APP_ENV: production

  redis:
    # ปิด port ออก host ทั้งหมดใน prod
    ports: []

  nginx:
    image: nginx:alpine
    container_name: kbase-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - kbase-net
