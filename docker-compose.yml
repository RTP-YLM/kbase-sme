# KbaseSME — Development docker-compose
# ใช้สำหรับ local dev และ demo env
# Production: ใช้ docker-compose.prod.yml override

services:

  # ---------------------------------------------------------------------------
  # API — FastAPI backend (E4-x)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kbase-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src          # hot-reload ใน dev
      - ./models:/app/models    # BGE-M3 + reranker model files
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - kbase-net

  # ---------------------------------------------------------------------------
  # Worker — Celery (async ingest E2-5)
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kbase-worker
    restart: unless-stopped
    env_file: .env
    command: celery -A src.worker worker --loglevel=info --concurrency=2
    volumes:
      - ./src:/app/src
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - kbase-net

  # ---------------------------------------------------------------------------
  # Redis — queue + semantic cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: kbase-redis
    restart: unless-stopped
    # ห้าม expose port 6379 ออก host ใน prod — dev เปิดไว้เพื่อ debug
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kbase-net

  # ---------------------------------------------------------------------------
  # Web — Next.js frontend (E5-x)  [placeholder — เพิ่มเมื่อมี Next.js app]
  # ---------------------------------------------------------------------------
  # web:
  #   build:
  #     context: ./web
  #     dockerfile: Dockerfile
  #   container_name: kbase-web
  #   restart: unless-stopped
  #   env_file: ./web/.env.local
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - api
  #   networks:
  #     - kbase-net

  # ---------------------------------------------------------------------------
  # nginx — reverse proxy (E7-2)  [ใช้ใน prod — dev ข้ามได้]
  # ---------------------------------------------------------------------------
  # nginx:
  #   image: nginx:alpine
  #   container_name: kbase-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - api
  #     - web
  #   networks:
  #     - kbase-net

volumes:
  redis-data:

networks:
  kbase-net:
    driver: bridge
